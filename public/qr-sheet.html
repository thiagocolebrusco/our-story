<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Story — Envelopes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fef9f0;
      font-family: 'Lato', sans-serif;
      padding: 32px 24px;
      color: #3d1f14;
    }

    /* ── Page header ── */
    .sheet-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .sheet-title {
      font-family: 'Dancing Script', cursive;
      font-size: 36px;
      color: #5c2235;
    }
    .sheet-subtitle {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 2px;
      color: #a88070;
      margin-top: 4px;
      text-transform: uppercase;
    }
    .sheet-rule {
      width: 80px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #c4973b, transparent);
      margin: 10px auto 0;
    }

    /* ── Print button ── */
    .print-btn {
      display: block;
      margin: 0 auto 32px;
      padding: 10px 28px;
      background: linear-gradient(135deg, #5c2235, #7a2d3d);
      border: 1.5px solid #c4973b;
      border-radius: 24px;
      color: #f5e6c8;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-style: italic;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .print-btn:hover { opacity: 0.85; }

    /* ── Grid of envelope cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Individual card ── */
    .card {
      background: linear-gradient(160deg, #5c1a2a 0%, #3d0f1c 40%, #2a0a14 100%);
      border: 1.5px solid #c4973b;
      border-radius: 10px;
      padding: 14px 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      break-inside: avoid;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    /* Inner gold border */
    .card::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(196, 151, 59, 0.3);
      border-radius: 6px;
      pointer-events: none;
    }

    .card-year {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #f5e6c8;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .qr-wrap {
      width: 110px;
      height: 110px;
      background: #fffdf8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    .qr-wrap canvas,
    .qr-wrap img {
      width: 100% !important;
      height: 100% !important;
    }

    .card-label {
      font-family: 'Dancing Script', cursive;
      font-size: 12px;
      color: #c4973b;
      text-align: center;
      line-height: 1.3;
      max-width: 120px;
    }

    .card-deco {
      font-size: 8px;
      color: rgba(196, 151, 59, 0.6);
      letter-spacing: 3px;
    }

    /* ── Print styles ── */
    @media print {
      body { background: white; padding: 12px; }
      .print-btn { display: none; }
      .sheet-header { margin-bottom: 20px; }
      .grid { gap: 12px; }
      .card { box-shadow: none; border-color: #c4973b; }
    }
  </style>
</head>
<body>

  <div class="sheet-header">
    <div class="sheet-title">Our Story</div>
    <div class="sheet-subtitle">Thiago & Mayara · 2009 – 2025</div>
    <div class="sheet-rule"></div>
  </div>

  <button class="print-btn" onclick="window.print()">✦ Imprimir envelopes ✦</button>

  <div class="grid" id="grid"></div>

  <script>
    const years = [
      { year: 2009, title: 'O começo de tudo' },
      { year: 2010, title: 'Descobrindo um ao outro' },
      { year: 2011, title: 'Mil memórias' },
      { year: 2012, title: 'Nosso lar' },
      { year: 2013, title: 'Um ano inesquecível' },
      { year: 2014, title: 'Crescendo juntos' },
      { year: 2015, title: 'Simplicidade' },
      { year: 2016, title: 'Sempre do lado' },
      { year: 2017, title: 'Cada vez melhor' },
      { year: 2018, title: 'Só nós dois' },
      { year: 2019, title: 'Dias dourados' },
      { year: 2020, title: 'Juntos por tudo' },
      { year: 2021, title: 'Recomeçando' },
      { year: 2022, title: 'Novos capítulos' },
      { year: 2023, title: 'Mais fortes' },
      { year: 2024, title: 'Mais uma volta ao sol' },
      { year: 2025, title: '17 anos de amor' },
    ]

    // Base URL — same origin as this sheet, pointing to the main app
    const base = window.location.origin

    const grid = document.getElementById('grid')

    years.forEach(({ year, title }) => {
      const url = `${base}/?unlock=${year}`

      const card = document.createElement('div')
      card.className = 'card'
      card.innerHTML = `
        <div class="card-year">${year}</div>
        <div class="qr-wrap" id="qr-${year}"></div>
        <div class="card-label">${title}</div>
        <div class="card-deco">✦ ♡ ✦</div>
      `
      grid.appendChild(card)

      // Generate QR code into the placeholder div
      new QRCode(document.getElementById(`qr-${year}`), {
        text: url,
        width: 98,
        height: 98,
        colorDark: '#2a0a14',
        colorLight: '#fffdf8',
        correctLevel: QRCode.CorrectLevel.M,
      })
    })
  </script>
</body>
</html>
