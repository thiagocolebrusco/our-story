services:
  - type: web
    name: our-story
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true

    envVars:
      - key: NODE_VERSION
        value: 22

    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
